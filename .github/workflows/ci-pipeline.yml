name: Build and Push KnowledgeNest Services

# This tells GitHub to run this script ONLY when you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub provides this temporary server for free

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build & Push Frontend
      - name: Build and Push React Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-react
          push: true
          tags: awaiskhan342/knowledge-nest-frontend:latest

      # 2. Build & Push Gateway
      - name: Build and Push API Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./backend-gateway
          push: true
          tags: awaiskhan342/knowledge-nest-gateway:latest

      # 3. Build & Push Auth Service
      - name: Build and Push Auth Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend-auth
          push: true
          tags: awaiskhan342/knowledge-nest-auth:latest

      # 4. Build & Push Course Service
      - name: Build and Push Course Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend-course
          push: true
          tags: awaiskhan342/knowledge-nest-course:latest

      # 5. Build & Push Review Service
      - name: Build and Push Review Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend-review
          push: true
          tags: awaiskhan342/knowledge-nest-review:latest

      # 6. Build & Push Notification Service
      - name: Build and Push Notification Service
        uses: docker/build-push-action@v4
        with:
          context: ./backend-notification
          push: true
          tags: awaiskhan342/knowledge-nest-notification:latest
