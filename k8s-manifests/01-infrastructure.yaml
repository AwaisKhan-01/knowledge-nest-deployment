apiVersion: v1
kind: Namespace
metadata:
  name: knowledge-nest
---
# PostgreSQL Database
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: knowledge-nest
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              value: "nest_user"
            - name: POSTGRES_PASSWORD
              value: "nest_password"
            - name: POSTGRES_DB
              value: "knowledge_nest"
          ports:
            - containerPort: 5432
---
# RabbitMQ Broker
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: knowledge-nest
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
---
# Inside 01-infrastructure.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      enableServiceLinks: false
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 5672
            - containerPort: 15672 # Management UI port
          env:
            # ADD THESE TWO LINES BELOW
            - name: RABBITMQ_DEFAULT_USER
              value: "admin"
            - name: RABBITMQ_DEFAULT_PASS
              value: "admin"