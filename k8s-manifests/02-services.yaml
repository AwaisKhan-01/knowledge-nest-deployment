  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      enableServiceLinks: false
      containers:
        - name: notification-service
          image: awaiskhan342/knowledge-nest-notification:latest
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq:5672/"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              value: "admin"
            - name: RABBITMQ_PASS
