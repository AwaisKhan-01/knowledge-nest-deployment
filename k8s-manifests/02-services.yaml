# 6. React Frontend
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: knowledge-nest
spec:
  type: NodePort 
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: awaiskhan342/knowledge-nest-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000