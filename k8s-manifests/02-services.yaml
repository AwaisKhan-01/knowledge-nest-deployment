# ==========================================
# 1. API Gateway (The Traffic Cop)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: knowledge-nest
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: awaiskhan342/knowledge-nest-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: COURSE_SERVICE_URL
              value: "http://course-service:5002"

# ==========================================
# 2. Synchronous Backend Services (Auth, Course, Review)
# ==========================================
---
# Auth Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: knowledge-nest
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: awaiskhan342/knowledge-nest-auth:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: "postgresql://nest_user:nest_password@postgres:5432/knowledge_nest"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
---
# Course Service (Skipping the Service definition block for brevity, but it mirrors Auth)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
        - name: course-service
          image: awaiskhan342/knowledge-nest-course:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: "postgresql://nest_user:nest_password@postgres:5432/knowledge_nest"

# ==========================================
# 3. Asynchronous Worker (Notification Service)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: awaiskhan342/knowledge-nest-notification:latest
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"

# ==========================================
# 4. React Frontend (User Interface)
# ==========================================
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: knowledge-nest
spec:
  type: NodePort # This exposes the app to the outside internet
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080 # Users will access your app via this port
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: awaiskhan342/knowledge-nest-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000