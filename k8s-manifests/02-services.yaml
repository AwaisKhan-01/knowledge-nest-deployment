# 1. API Gateway
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: knowledge-nest
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: awaiskhan342/knowledge-nest-gateway:latest
          imagePullPolicy: Always
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: COURSE_SERVICE_URL
              value: "http://course-service:5002"
            - name: REVIEW_SERVICE_URL
              value: "http://review-service:5003"
---
# 2. Auth Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: knowledge-nest
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: knowledge-nest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: awaiskhan342/knowledge-nest-auth:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: "postgresql://nest_user:nest_password@postgres:5432/knowledge_nest"
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq:5672/"
---
